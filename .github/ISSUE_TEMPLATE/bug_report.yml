name: Bug report
about: Report a defect in keiailab-commons
title: '[BUG] '
labels: ['bug', 'triage']
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please search existing issues first to avoid duplicates.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues
          required: true
        - label: I can reproduce this issue with a minimal Go test case
          required: true
        - label: This is not a security vulnerability (use SECURITY.md for security reports)
          required: true

  - type: input
    id: commons_version
    attributes:
      label: keiailab-commons version
      description: Which release tag (or commit SHA) are you using?
      placeholder: "e.g. v0.9.0"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version
      description: "Output of `go version`."
      placeholder: "e.g. go version go1.26.0 darwin/arm64"
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      description: Which `pkg/<sub>` exposes the defect?
      options:
        - pkg/events
        - pkg/finalizer
        - pkg/labels
        - pkg/monitoring
        - pkg/networkpolicy
        - pkg/probes
        - pkg/pvc
        - pkg/security
        - pkg/status
        - pkg/storageclass
        - pkg/topology
        - pkg/version
        - pkg/webhook
        - Helm library chart (charts/keiailab-commons)
        - Build / tooling (Makefile, lefthook, scripts)
        - Documentation (docs/)
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide a minimal Go test case that demonstrates the defect.
      placeholder: |
        ```go
        package mypkg_test

        import (
            "testing"
            "github.com/keiailab/keiailab-commons/pkg/security"
        )

        func TestRepro(t *testing.T) {
            sc := security.RestrictedContainer()
            if sc == nil {
                t.Fatal("expected non-nil SecurityContext")
            }
        }
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happens? Include error output, panic stack, or diff.
      placeholder: |
        ```
        --- FAIL: TestRepro (0.00s)
            repro_test.go:9: expected non-nil SecurityContext
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that helps reproduce or understand the defect.
