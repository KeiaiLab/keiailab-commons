name: Feature request
about: Suggest a helper, API, or improvement for keiailab-commons
title: '[FEATURE] '
labels: ['enhancement', 'triage']
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement.
        Please check existing issues and the [roadmap](../../docs/ROADMAP.md) first.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and feature requests
          required: true
        - label: This is not already covered by `docs/ROADMAP.md`
          required: true

  - type: textarea
    id: feature_description
    attributes:
      label: Feature description
      description: A clear and concise description of the helper, API, or improvement.
      placeholder: "e.g. Add `WithPodPriorityClass(...)` option to `pkg/security` for cluster-priority-class injection."
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case / motivation
      description: Explain why this is useful. What problem does it solve for downstream consumers?
      placeholder: |
        Downstream operators repeatedly inject a PriorityClassName into the
        PodSpec next to the SecurityContext builder. Centralising the option
        in `pkg/security` removes drift and aligns naming.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: proposed_api
    attributes:
      label: Proposed API
      description: Describe the proposed API surface and a usage example.
      placeholder: |
        ```go
        ctx := security.RestrictedContainer(
            security.WithPodPriorityClass("system-cluster-critical"),
        )
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you have ruled out, and why.

  - type: dropdown
    id: willing_to_contribute
    attributes:
      label: Willing to contribute
      description: Would you submit a PR for this?
      options:
        - 'Yes, I can submit a PR'
        - 'Yes, with maintainer guidance'
        - 'No, I am only proposing'
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Links to references, related issues, or examples.
      placeholder: |
        - Related issue: #123
        - Reference: https://pkg.go.dev/k8s.io/api/core/v1
      render: markdown
