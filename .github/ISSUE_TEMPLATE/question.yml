name: Question
about: Ask a question about keiailab-commons usage or design
title: '[QUESTION] '
labels: ['question', 'triage']
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        For general usage questions, prefer
        [GitHub Discussions](https://github.com/keiailab/keiailab-commons/discussions).
        Use this template only when the question requires maintainer attention
        (e.g. an API ambiguity that may need a documentation fix).

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing Discussions and issues
          required: true
        - label: I have checked the `pkg/<sub>/doc.go` documentation for the package in question
          required: true
        - label: This is not a security question (use SECURITY.md for security reports)
          required: true

  - type: dropdown
    id: question_type
    attributes:
      label: Question type
      description: What kind of question is this?
      options:
        - 'Usage — how do I use a package / API?'
        - 'Design — why is something modelled this way?'
        - 'Documentation — clarification needed in docs/ or godoc'
        - 'Compatibility — Go version, Kubernetes API version, semver'
        - 'Other'
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: State the question precisely. Include the package name and the API surface you are asking about.
      placeholder: "How does `pkg/version.Matrix[E].MarshalJSON` decide key ordering?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? Include the relevant code snippet if useful.
      render: markdown

  - type: input
    id: commons_version
    attributes:
      label: keiailab-commons version
      description: Which release tag (or commit SHA) are you asking about?
      placeholder: "e.g. v0.9.0"

  - type: markdown
    attributes:
      value: |
        ---
        **Note:** Questions are community-supported and response times may vary.
        For security issues use the private disclosure process in `SECURITY.md`.
