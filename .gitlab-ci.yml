# RFC-0043 L5 GitLab CI shadow phase — operator-commons (Go library, 2026-05-20)
#
# 본 file = SSOT include + Go job 4종 repo-local override.
# Codex challenge #2 fix (RFC-0045 §2.5 stage 3): SSOT template 의 stage matrix
# (lint/typecheck/test/audit) 가 Python/Node/Rust/Terraform/Helm/YAML/Shell 만 — Go job 부재.
# `STACK_TAGS: "go,helm"` 도 SSOT 의 rules.exists 가 우선이므로 *빈 envelope*.
# 따라서 operator-commons 가 *생산자 격* (cross-repo benefit) Go job 4종 직접 정의.
#
# shadow phase 전환 조건 (Codex challenge #4 정합):
#   (a) ≥10 completed MR pipelines
#   (b) Go job 4종 모두 실행 + PASS evidence
#   (c) `mcp__keiailab-gitlab__manage_pipeline` 로 runner online verify
#   (d) defer 조건: runner offline 또는 sample <10 시 shadow 연장, enforcing 미진입
#
# I08 (별 PR, ai-dev SSOT Go job 통합) 후 operator-commons 의 repo-local override 제거 가능.

include:
  - project: 'keiailab/services/ai-dev'
    file: '/templates/gitlab/.gitlab-ci.yml'
    ref: stable

variables:
  STACK_TAGS: "go,helm"

# ─── Go stack-specific job 4종 (Codex challenge #2 진본 fix) ──────────────────
# 모두 RFC-0043 shadow phase 정합: `allow_failure: true` (typecheck/test 제외 — 진본 결함).
# enforcing 전환 후 `allow_failure: true` 제거.

go-lint:
  stage: lint
  image: golangci/golangci-lint:latest-alpine
  allow_failure: true  # RFC-0043 shadow phase: info only
  rules:
    - exists:
        - go.mod
  script:
    - golangci-lint run --timeout=5m
    - |
      unformatted=$(gofmt -l .)
      if [ -n "$unformatted" ]; then
        echo "::ERROR:: gofmt 위반 발견:"
        echo "$unformatted"
        exit 1
      fi

go-vet:
  stage: typecheck
  image: golang:1.25.7-alpine
  rules:
    - exists:
        - go.mod
  cache:
    key: "go-mod-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  variables:
    GOMODCACHE: ${CI_PROJECT_DIR}/.go/pkg/mod
  before_script:
    - apk add --no-cache git
  script:
    - go vet ./...

go-test:
  stage: test
  image: golang:1.25.7-alpine
  rules:
    - exists:
        - go.mod
  cache:
    key: "go-mod-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
      - .gocache/
  variables:
    GOMODCACHE: ${CI_PROJECT_DIR}/.go/pkg/mod
    GOCACHE: ${CI_PROJECT_DIR}/.gocache
  before_script:
    - apk add --no-cache git gcc musl-dev
  script:
    - go test ./... -race -cover -coverprofile=coverage.out -timeout=15m
    - go tool cover -func=coverage.out | tail -3
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - coverage.out
    expire_in: 1 week

go-vulncheck:
  stage: audit
  image: golang:1.25.7-alpine
  allow_failure: true  # RFC-0043 shadow phase + transitive CVE 가 release 차단 회피
  rules:
    - exists:
        - go.mod
  cache:
    key: "go-mod-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  variables:
    GOMODCACHE: ${CI_PROJECT_DIR}/.go/pkg/mod
  before_script:
    - apk add --no-cache git
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - $(go env GOPATH)/bin/govulncheck ./...
