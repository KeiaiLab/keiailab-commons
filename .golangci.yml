# 라이브러리 특성에 맞춘 golangci-lint 설정 —
# 맞게 단순화 (ginkgolinter / depguard SDK 규칙 제외, dupl 완화).
version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
        # newexpr: new(x) 변환 — k8s 생태계 표준 idiom 인 ptr.To(x) 유지 (security/pvc helper).
        - newexpr
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
          - dupl
        path: pkg/.*_test\.go$
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
